# HTTPS demo gateway (nip.io). Installed by setup-https.sh — do not edit DEMO_NIP_HOST by hand.

server {
    listen 80;
    server_name DEMO_NIP_HOST;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name DEMO_NIP_HOST;

    ssl_certificate     /etc/letsencrypt/live/DEMO_NIP_HOST/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DEMO_NIP_HOST/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /rpc {
        rewrite ^/rpc$ / break;
        proxy_pass http://127.0.0.1:8545;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /orchestrator/ {
        rewrite ^/orchestrator/(.*) /$1 break;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /evidence/ {
        rewrite ^/evidence/(.*) /$1 break;
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
