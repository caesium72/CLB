# Cache-enabled nginx reverse proxy used by the Attack III local harness.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=default_cache:10m
                     max_size=100m inactive=60m use_temp_path=off;

    server {
        listen 8080;

        location / {
            proxy_pass http://host.docker.internal:3800;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Cache 200 responses by URL unless upstream cache controls forbid it.
            proxy_cache default_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_key $request_uri;

            proxy_cache_bypass $http_cache_control;

            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
