name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run Bun tests
        run: bun test

      - name: Run Phase 3 attack benchmark
        run: bun run e2e:phase3

      - name: Run Phase 4 delegated benchmark
        run: bun run e2e:phase4

      - name: Run Phase 4 P5 predicate-attack benchmark
        run: bun run e2e:phase4b

      - name: Run Phase 7D baseline comparison
        run: bun run e2e:phase7-baselines

      - name: Check baseline-comparison drift
        run: git diff --exit-code experiments/benchmarks/baseline-comparison.md

  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install forge-std
        working-directory: contracts
        run: forge install foundry-rs/forge-std

      - name: Run forge tests
        working-directory: contracts
        run: forge test -vvv

  python-scorer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run Python scorer tests
        working-directory: experiments/risk-scoring
        run: |
          uv sync --dev
          uv run pytest
