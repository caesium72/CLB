[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200

[fmt]
line_length = 100
tab_width = 4

# Base Sepolia is the first testnet target. RPC + key come from the repo .env.
[rpc_endpoints]
base_sepolia = "${RPC_URL_BASE_SEPOLIA}"
anvil = "http://127.0.0.1:8545"
