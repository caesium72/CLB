[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
# Phase 7A: valueAtomic added an 8th SettlementParams field, tipping
# validateAndConsume / settlementParamsDigest over the legacy stack limit.
# via_ir resolves "stack too deep" without changing runtime keccak digests.
via_ir = true

[fmt]
line_length = 100
tab_width = 4

# Base Sepolia is the first testnet target. RPC + key come from the repo .env.
[rpc_endpoints]
base_sepolia = "${RPC_URL_BASE_SEPOLIA}"
anvil = "http://127.0.0.1:8545"
